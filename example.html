<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página del Socio | Anime Offis Ads Test</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .video-container {
            width: 80%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border: 2px solid #1e293b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .play-button {
            width: 80px;
            height: 80px;
            background: rgba(0, 170, 255, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .play-button:hover {
            transform: scale(1.1);
        }
        .info {
            margin-top: 20px;
            text-align: center;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h1>Mi Sitio de Anime</h1>
    
    <div class="video-container" id="player">
        <div class="play-button">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
                <path d="M8 5v14l11-7z"/>
            </svg>
        </div>
    </div>

    <div class="info">
        <p>El anuncio se cargará automáticamente antes del video gracias al SDK de Anime Offis.</p>
    </div>

    <script src="https://cdn.animeoffis.com/sdk.js?id=AO-123456"></script>

</body>
</html>
